<!DOCTYPE html>
<html>
<head>

<title>Login - ExpenseBank</title>

<link rel="stylesheet" href="auth.css">

</head>

<body>


<div class="auth-box">

<h2>Login</h2>


<input 
type="email"
id="loginEmail"
placeholder="Enter Email">


<input 
type="password"
id="loginPassword"
placeholder="Enter Password">



<button onclick="login()">
Login
</button>


<p>
Don't have an account?
<a href="register.html">
Register
</a>
</p>


</div>



<script src="auth.js"></script>


</body>
</html>
