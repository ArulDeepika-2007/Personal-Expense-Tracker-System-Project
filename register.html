<!DOCTYPE html>
<html>

<head>

<title>Register - ExpenseBank</title>

<link rel="stylesheet" href="auth.css">

</head>


<body>


<div class="auth-box">


<h2>Create Account</h2>


<input
type="text"
id="name"
placeholder="Full Name">



<input
type="email"
id="email"
placeholder="Email">



<input
type="password"
id="password"
placeholder="Password">



<button onclick="register()">

Register

</button>



<p>

Already have account?

<a href="login.html">
Login
</a>

</p>


</div>



<script src="auth.js"></script>


</body>

</html>
